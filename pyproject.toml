# Tooling configuration for AirMouse. The app runs as a set of scripts
# (no build step needed) — this file just configures pytest and ruff.

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = ["assets", "screenshots", "demo", ".venv", "__pycache__"]

[tool.ruff.lint]
# Pyflakes (F) catches real bugs (undefined names, unused imports); a subset of
# pycodestyle (E/W) keeps things tidy without fighting the existing style.
select = ["E9", "F63", "F7", "F82", "F401", "F811", "W605"]
