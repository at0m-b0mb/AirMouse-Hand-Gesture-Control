<svg viewBox="0 0 760 470" width="760" height="470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <path id="track" d="M 170,330 C 300,150 430,150 470,250 C 510,350 360,400 250,360 C 150,325 120,210 250,170 C 400,122 560,190 600,300" fill="none"/>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="760" height="470" rx="18" fill="#0E0B16"/>

  <!-- header -->
  <text x="30" y="40" fill="#6C5CE7" font-size="24" font-weight="700">◈ AirMouse</text>
  <text x="172" y="40" fill="#8A85A0" font-size="13">Touch-Free Laptop Control</text>
  <rect x="648" y="22" width="84" height="26" rx="13" fill="#241E36"/>
  <text x="690" y="39" fill="#2DD4BF" font-size="12" text-anchor="middle">v3.2 · Aurora</text>
  <rect x="0" y="54" width="760" height="4" fill="url(#strip)"/>

  <!-- preview panel -->
  <rect x="24" y="72" width="712" height="350" rx="14" fill="#140F22" stroke="#241E36" stroke-width="1.5"/>

  <!-- status bar inside panel -->
  <circle cx="48" cy="100" r="6" fill="#2DD4BF">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="100" r="9" fill="none" stroke="#2DD4BF" stroke-width="1" opacity="0.5"/>
  <text x="64" y="105" fill="#ECEAF5" font-size="14" font-weight="600">MOUSE</text>
  <text x="712" y="105" fill="#8A85A0" font-size="12" text-anchor="end">58 fps</text>

  <!-- cycling gesture label (centered) -->
  <g font-size="15" font-weight="700" text-anchor="middle">
    <text x="380" y="105" fill="#2DD4BF" opacity="0">👆 MOVE
      <animate attributeName="opacity" dur="10s" repeatCount="indefinite" begin="0s"   values="0;1;1;0;0" keyTimes="0;0.02;0.22;0.25;1"/></text>
    <text x="380" y="105" fill="#2DD4BF" opacity="0">🤌 LEFT CLICK
      <animate attributeName="opacity" dur="10s" repeatCount="indefinite" begin="2.5s" values="0;1;1;0;0" keyTimes="0;0.02;0.22;0.25;1"/></text>
    <text x="380" y="105" fill="#2DD4BF" opacity="0">✌️ SCROLL
      <animate attributeName="opacity" dur="10s" repeatCount="indefinite" begin="5s"   values="0;1;1;0;0" keyTimes="0;0.02;0.22;0.25;1"/></text>
    <text x="380" y="105" fill="#2DD4BF" opacity="0">✊ DRAG
      <animate attributeName="opacity" dur="10s" repeatCount="indefinite" begin="7.5s" values="0;1;1;0;0" keyTimes="0;0.02;0.22;0.25;1"/></text>
  </g>

  <!-- faint motion trail -->
  <use href="#track" stroke="#6C5CE7" stroke-width="2" stroke-dasharray="3 9" opacity="0.18"/>

  <!-- click ripple (pulses once per loop, mid-cycle) -->
  <circle cx="470" cy="250" fill="none" stroke="#2DD4BF" stroke-width="2">
    <animate attributeName="r"       dur="10s" repeatCount="indefinite" values="0;0;8;46;46" keyTimes="0;0.24;0.26;0.34;1"/>
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" values="0;0;0.8;0;0"  keyTimes="0;0.24;0.26;0.34;1"/>
  </circle>

  <!-- glow cursor traveling the track -->
  <g>
    <animateMotion dur="10s" repeatCount="indefinite" rotate="0">
      <mpath href="#track"/>
    </animateMotion>
    <circle r="26" fill="url(#glow)"/>
    <circle r="10" fill="none" stroke="#2DD4BF" stroke-width="2.5"/>
    <circle r="3.5" fill="#2DD4BF"/>
  </g>

  <!-- caption -->
  <text x="380" y="452" fill="#8A85A0" font-size="13" text-anchor="middle">
    Move · click · scroll · drag · type — all in the air, no touch needed.
  </text>
</svg>
