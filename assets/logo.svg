<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AirMouse logo">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="52%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="60" fill="url(#aurora)"/>
  <rect x="8" y="8" width="240" height="240" rx="60" fill="url(#glow)"/>

  <!-- hand-landmark constellation -->
  <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M104 186 L96 132 M104 186 L128 120 M104 186 L154 126 M104 186 L176 150"/>
  </g>
  <g fill="#ffffff">
    <circle cx="104" cy="186" r="9"/>
    <circle cx="96"  cy="132" r="7"/>
    <circle cx="128" cy="120" r="7"/>
    <circle cx="154" cy="126" r="7"/>
    <circle cx="176" cy="150" r="7"/>
  </g>

  <!-- pinch spark between thumb & index -->
  <circle cx="112" cy="126" r="13" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.9"/>
  <circle cx="112" cy="126" r="22" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.35" filter="url(#soft)"/>

  <!-- cursor arrow -->
  <g transform="translate(150 168) rotate(8)">
    <path d="M0 0 L0 34 L9 26 L15 40 L21 37 L15 23 L26 23 Z"
          fill="#0E0B16" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
</svg>
